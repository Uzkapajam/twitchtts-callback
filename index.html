<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twitch Callback</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    main {
      max-width: 520px;
    }

    a {
      color: #bb86fc;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to app...</h1>
    <p>If the app does not open automatically, tap the link below.</p>
    <p><a id="open-app" href="#">Open app</a></p>
  </main>

  <script>
    const fallbackRedirectBase = "lv.uzkapajam.twitchtts://auth";
    const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const state = params.get("state") || "";
    const encodedRedirect = state.includes("|") ? state.split("|")[1] : "";
    const redirectBase = encodedRedirect ? decodeURIComponent(encodedRedirect) : fallbackRedirectBase;
    const query = params.toString();
    const appUrl = query ? `${redirectBase}?${query}` : redirectBase;

    document.getElementById("open-app").href = appUrl;
    window.location.replace(appUrl);
  </script>
</body>
</html>
