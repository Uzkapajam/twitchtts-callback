<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TwitchTTS Callback</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    a { color: #bb86fc; }
  </style>
</head>
<body>
  <main>
    <h1>Returning to TwitchTTS...</h1>
    <p>If the app does not open automatically, tap the button below.</p>
    <p><a id="open-app" href="#">Open TwitchTTS</a></p>
  </main>
  <script>
    const appRedirectBase = "lv.uzkapajam.twitchtts://auth";
    const params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const query = params.toString();
    const appUrl = query ? `${appRedirectBase}?${query}` : appRedirectBase;
    document.getElementById("open-app").href = appUrl;
    window.location.replace(appUrl);
  </script>
</body>
</html>
